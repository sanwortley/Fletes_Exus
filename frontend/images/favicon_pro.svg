<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Solid gold background square with slight rounding -->
  <rect width="64" height="64" rx="4" fill="#D3A129"/>
  
  <!-- "FLETES" at the top -->
  <text 
    x="32" 
    y="26" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="13" 
    font-weight="900" 
    fill="white" 
    text-anchor="middle"
    letter-spacing="0.5"
  >FLETES</text>
  
  <!-- "Y" small in the middle -->
  <text 
    x="32" 
    y="40" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="10" 
    font-weight="700" 
    fill="rgba(255,255,255,0.8)" 
    text-anchor="middle"
  >Y</text>
  
  <!-- "MUDANZAS" at the bottom -->
  <text 
    x="32" 
    y="54" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="11" 
    font-weight="900" 
    fill="white" 
    text-anchor="middle"
    letter-spacing="0.2"
  >MUDANZAS</text>
</svg>
